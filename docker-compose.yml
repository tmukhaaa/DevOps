# 4 контейнера: nginx, backend (Flask), PostgreSQL, pgAdmin
# Вариант 2: Flask на SaaS-стеке (контейнеризация Docker)

name: secure-app

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: secure-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - secure-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: secure-backend
    environment:
      DB_HOST: db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: analytics
      DATA_PATH: data/data.csv
      N_CLUSTERS: "3"
      INTERNAL_TOKEN: dev-internal-token
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - secure-net

  db:
    image: postgres:15-alpine
    container_name: secure-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: analytics
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - secure-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: secure-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mail.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - secure-net

networks:
  secure-net:
    driver: bridge

volumes:
  pgdata:
