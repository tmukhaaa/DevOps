# Кластер: один Pod с четырьмя контейнерами (п. 7–8 задания)
# Развёртывание: kubectl apply -f contig.yaml -f k8s/nginx-configmap.yaml -f k8s/service.yaml
# Предварительно: docker build -t backend-image:latest -f backend/Dockerfile .

apiVersion: v1
kind: Pod
metadata:
  name: secure-app
  labels:
    app: secure-analytics
    theme: "159"
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
          name: http
      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"

    - name: backend
      image: backend-image:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 5000
          name: api
      env:
        - name: DB_HOST
          value: "127.0.0.1"
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "admin"
        - name: POSTGRES_DB
          value: "analytics"
        - name: DATA_PATH
          value: "data/data.csv"
        - name: N_CLUSTERS
          value: "3"
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"

    - name: postgres
      image: postgres:15-alpine
      ports:
        - containerPort: 5432
          name: postgres
      env:
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "admin"
        - name: POSTGRES_DB
          value: "analytics"
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"

    - name: pgadmin
      image: dpage/pgadmin4:8
      ports:
        - containerPort: 80
          name: pgadmin
      env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: "admin@mail.com"
        - name: PGADMIN_DEFAULT_PASSWORD
          value: "admin"
        - name: PGADMIN_CONFIG_SERVER_MODE
          value: "False"
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"

  volumes:
    - name: nginx-config
      configMap:
        name: nginx-secure-config
    - name: pgdata
      emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: secure-app-service
spec:
  type: NodePort
  selector:
    app: secure-analytics
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: pgadmin
      port: 5050
      targetPort: 80
      protocol: TCP
      nodePort: 30050
