# Reverse-proxy с защитой от форсированного веб-браузинга (тема 159)

server {
    listen 80;
    server_name localhost;

    # Скрытие версии nginx
    server_tokens off;

    # Заголовки безопасности
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Запрет доступа к служебным и «угадываемым» путям
    location ~ ^/(admin|internal|config|backup|\.git|\.env) {
        deny all;
        return 403;
    }

    # Защита от path traversal
    location ~ \.\. {
        deny all;
        return 403;
    }

    # Публичное API приложения
    location / {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Статика графиков через backend
    location /static/ {
        proxy_pass http://backend:5000/static/;
    }
}
